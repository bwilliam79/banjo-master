services:
  banjo-master:
    build: .
    expose:
      - "3000"
    restart: unless-stopped

  cert-gen:
    image: alpine:latest
    volumes:
      - certs:/certs
    command: >
      sh -c '
        if [ ! -f /certs/cert.pem ]; then
          apk add --no-cache openssl &&
          openssl req -x509 -newkey rsa:2048 -nodes
            -keyout /certs/key.pem -out /certs/cert.pem
            -days 365 -subj "/CN=media-server"
            -addext "subjectAltName=DNS:media-server,DNS:localhost,IP:127.0.0.1";
        fi
      '

  caddy:
    image: caddy:2-alpine
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - certs:/etc/caddy/certs:ro
      - caddy_data:/data
      - caddy_config:/config
    depends_on:
      cert-gen:
        condition: service_completed_successfully
      banjo-master:
        condition: service_started
    restart: unless-stopped

volumes:
  caddy_data:
  caddy_config:
  certs:
